<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de uso de imagens</title>
</head>
<body>
    <h1>Testando carga e imagens</h1>
    <p>Em baixo você vai ver uma imagem que está na mesma pasta.</p>
    <img src="HTML5-logo.png" alt="logo HTML5">  <!--Eesse img pega da pasta normal-->

    <p>Podemos também carregar imagens de sub-pastas.</p>
    <img src="imagens/CSS3-logo.png" alt="logo CSS3"><!--Esse img pega da sub-pasta-->

    <P>Também podemos carregar imagens externas</P>
    <img src="https://fernando-gaitan.com.ar/wp-content/uploads/javascript_id.png" alt="logo JavaScript"><!--Esse img pega direto do link usando URL-->
</body>
</html>
