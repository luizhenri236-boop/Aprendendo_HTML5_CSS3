<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paragrafos</title>
</head>
<body>
    <h1>Paragrafos e quebras de linha</h1>
    <br>
    <p>Você pode escrever um paragrafo de qualquer jeito. Basta colocar tudo no meio da par de tags &lt;p&gt; e &lt;/p&gt;</p>
    <p>Se precisar quebrar o texto em algum lugar especifico <br> como esse, você pode usar a tag &lt;br&gt;</p>
    <p>Vamos usar alguns sinbulos especiais:
        &nbsp;
        &reg;
        &copy;
        &trade;
        &euro;
        &pound;
        &yen;
        &sum;
        &Delta;
        &larr;
        &uarr;
        &rarr;
        &darr;
    </p>
    p
</body>
</html>
