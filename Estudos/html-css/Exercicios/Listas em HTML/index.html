<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="Favicon_sem_fundo-200.png" type="image/x-icon">
    <title>Listas</title>
</head>
<body>
    <h1>Trabalhando com listas</h1>
    <h2>Listas ordenadas</h2>
    <ol type="1"> <!-- 1 A a I i-->
        <li>Cordar</li>
        <li>Desligar o despertador</li>
        <li>Tomar café</li>
        <li>Escovar os dentes</li>
        <li>Tomar Banho</li>
        <li>Ir para o trabalho</li>
    </ol>
    <h2>Lista Não ordenadas</h2>
    <ul type="square"> <!-- disc circle square-->
        <li>Pão</li>
        <li>Manteiga</li>
        <li>Presunto</li>
        <li>Ovos</li>
        <li>Suco de Uva</li>
    </ul>
</body>
</html>
